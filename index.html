<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Dự Đoán Khả Năng Trúng Tuyển Đại Học</title>
    <style>
        /* --- HỆ MÀU PASTEL DỄ CHỊU & THOẢI MÁI --- */
        :root {
            --bg-gradient: linear-gradient(135deg, #eef2f7 0%, #dfe9f3 100%);
            --primary-color: #4a90e2;
            --secondary-color: #67c23a;
            --text-dark: #2c3e50;
            --text-light: #7f8c8d;
            --card-bg: #ffffff;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
            --border-radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-dark);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 40px;
        }

        /* --- HEADER --- */
        header {
            text-align: center;
            margin-bottom: 35px;
        }

        header h1 {
            color: #3a7bd5;
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        header p {
            color: var(--text-light);
            font-size: 1rem;
        }

        /* --- FORM NHẬP LIỆU --- */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            background: #f8fafc;
            padding: 25px;
            border-radius: var(--border-radius);
            border: 1px solid #e2e8f0;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #4a5568;
        }

        .form-group select, .form-group input {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            background-color: #fff;
        }

        .form-group select:focus, .form-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.2);
        }

        .btn-submit {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #4a90e2 0%, #3a7bd5 100%);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3);
        }

        .btn-submit:hover {
            opacity: 0.95;
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        /* --- KẾT QUẢ --- */
        .result-section {
            margin-top: 30px;
            display: none;
        }

        .result-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: var(--text-dark);
            border-left: 5px solid var(--primary-color);
            padding-left: 10px;
        }

        /* Bảng hiển thị kết quả */
        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: #fff;
            border-radius: var(--border-radius);
            overflow: hidden;
        }

        th, td {
            padding: 16px 20px;
            text-align: left;
        }

        th {
            background-color: #edf2f7;
            color: #4a5568;
            font-weight: 600;
            font-size: 0.95rem;
        }

        tr {
            border-bottom: 1px solid #e2e8f0;
            transition: background-color 0.2s;
        }

        tr:hover {
            background-color: #f8fafc;
        }

        /* Badge trạng thái */
        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-high {
            background-color: #e6fffa;
            color: #047481;
            border: 1px solid #b2f5ea;
        }

        .badge-safe {
            background-color: #f0fff4;
            color: #22543d;
            border: 1px solid #c6f6d5;
        }

        .score-positive {
            color: #2f855a;
            font-weight: bold;
        }

        .no-result {
            text-align: center;
            padding: 30px;
            color: var(--text-light);
            background: #f8fafc;
            border-radius: var(--border-radius);
            font-style: italic;
        }

        /* Responsive di động */
        @media (max-width: 768px) {
            body { padding: 15px 10px; }
            .container { padding: 20px; }
            header h1 { font-size: 1.6rem; }
            th, td { padding: 12px 10px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Dự Đoán Khả Năng Đậu Đại Học</h1>
        <p>Hệ thống so sánh điểm thông minh dựa trên dữ liệu điểm chuẩn năm trước</p>
    </header>

    <!-- FORM NHẬP DỮ LIỆU -->
    <form id="calcForm" onsubmit="calculateAdmission(event)">
        <div class="form-grid">
            <div class="form-group">
                <label for="province">Chọn Tỉnh / Thành Phố</label>
                <select id="province">
                    <option value="all">-- Tất cả các tỉnh --</option>
                    <option value="Hà Nội">Hà Nội</option>
                    <option value="TP. HCM">TP. Hồ Chí Minh</option>
                    <option value="Đà Nẵng">Đà Nẵng</option>
                    <option value="Cần Thơ">Cần Thơ</option>
                </select>
            </div>

            <div class="form-group">
                <label for="major">Ngành Học Muốn Xét Tuyển</label>
                <select id="major" required>
                    <option value="">-- Chọn ngành học --</option>
                    <option value="Công nghệ thông tin">Công nghệ thông tin</option>
                    <option value="Quản trị kinh doanh">Quản trị kinh doanh</option>
                    <option value="Ngôn ngữ Anh">Ngôn ngữ Anh</option>
                    <option value="Marketing">Marketing</option>
                </select>
            </div>

            <div class="form-group">
                <label for="userScore">Điểm Tổ Hợp Của Bạn</label>
                <input type="number" id="userScore" step="0.01" min="0" max="30" placeholder="Ví dụ: 25.5" required>
            </div>

            <button type="submit" class="btn-submit">Phân Tích Khả Năng Đậu</button>
        </div>
    </form>

    <!-- VÙNG HIỂN THỊ KẾT QUẢ -->
    <div class="result-section" id="resultSection">
        <h2 class="result-title">Danh Sách Các Trường Có Khả Năng Đậu Cao Nhất</h2>
        <div class="table-responsive">
            <table id="resultTable">
                <thead>
                    <tr>
                        <th>Tên Trường</th>
                        <th>Tỉnh/Thành</th>
                        <th>Ngành</th>
                        <th>Điểm Chuẩn Năm Ngoái</th>
                        <th>Điểm Chênh Lệch</th>
                        <th>Khả Năng Khả Thi</th>
                    </tr>
                </thead>
                <tbody id="resultBody">
                    <!-- Dữ liệu JavaScript sẽ tự động render vào đây -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // GIẢ LẬP CƠ SỞ DỮ LIỆU ĐIỂM CHUẨN CỦA CÁC TRƯỜNG NĂM TRƯỚC
    const universityDatabase = [
        { name: "Đại học Bách Khoa", province: "Hà Nội", major: "Công nghệ thông tin", lastYearScore: 26.5 },
        { name: "Đại học Công Nghệ - ĐHQGHN", province: "Hà Nội", major: "Công nghệ thông tin", lastYearScore: 25.0 },
        { name: "Đại học Bách Khoa - ĐHQG-HCM", province: "TP. HCM", major: "Công nghệ thông tin", lastYearScore: 25.8 },
        { name: "Đại học CNTT - ĐHQG-HCM", province: "TP. HCM", major: "Công nghệ thông tin", lastYearScore: 24.5 },
        { name: "Đại học Sư phạm Kỹ thuật", province: "TP. HCM", major: "Công nghệ thông tin", lastYearScore: 23.5 },
        { name: "Đại học Bách Khoa", province: "Đà Nẵng", major: "Công nghệ thông tin", lastYearScore: 23.0 },
        { name: "Đại học Cần Thơ", province: "Cần Thơ", major: "Công nghệ thông tin", lastYearScore: 22.0 },

        { name: "Đại học Kinh tế Quốc dân", province: "Hà Nội", major: "Quản trị kinh doanh", lastYearScore: 26.0 },
        { name: "Đại học Kinh tế - ĐHQGHN", province: "Hà Nội", major: "Quản trị kinh doanh", lastYearScore: 24.0 },
        { name: "Đại học Kinh tế TP.HCM (UEH)", province: "TP. HCM", major: "Quản trị kinh doanh", lastYearScore: 24.8 },
        { name: "Đại học Ngoại Thương cơ sở 2", province: "TP. HCM", major: "Quản trị kinh doanh", lastYearScore: 26.2 },
        { name: "Đại học Kinh tế", province: "Đà Nẵng", major: "Quản trị kinh doanh", lastYearScore: 22.5 },

        { name: "Đại học Ngoại Thương", province: "Hà Nội", major: "Marketing", lastYearScore: 26.8 },
        { name: "Đại học Thương Mại", province: "Hà Nội", major: "Marketing", lastYearScore: 24.7 },
        { name: "Đại học Tài chính - Marketing", province: "TP. HCM", major: "Marketing", lastYearScore: 23.8 },

        { name: "Đại học Ngoại Ngữ - ĐHQGHN", province: "Hà Nội", major: "Ngôn ngữ Anh", lastYearScore: 25.2 },
        { name: "Đại học Khoa học Xã hội & Nhân văn", province: "TP. HCM", major: "Ngôn ngữ Anh", lastYearScore: 24.0 }
    ];

    function calculateAdmission(event) {
        event.preventDefault(); // Ngăn trang bị reload khi bấm nút

        // Lấy dữ liệu từ form
        const selectedProvince = document.getElementById('province').value;
        const selectedMajor = document.getElementById('major').value;
        const userScore = parseFloat(document.getElementById('userScore').value);

        // Lọc dữ liệu theo Tỉnh và Ngành, đồng thời áp dụng thuật toán so sánh điểm
        let filteredSchools = universityDatabase.filter(school => {
            // Lọc ngành trước
            if (school.major !== selectedMajor) return false;
            // Lọc tỉnh (nếu chọn 'all' thì bỏ qua bộ lọc tỉnh)
            if (selectedProvince !== 'all' && school.province !== selectedProvince) return false;
            
            // YÊU CẦU: Điểm đầu vào của User phải LỚN HƠN HOẶC BẰNG điểm chuẩn trường công bố
            return userScore >= school.lastYearScore;
        });

        // Tính toán điểm chênh lệch (Điểm của bạn - Điểm chuẩn trường)
        filteredSchools = filteredSchools.map(school => {
            const diff = userScore - school.lastYearScore;
            return {
                ...school,
                diff: parseFloat(diff.toFixed(2)) // Làm tròn 2 chữ số thập phân
            };
        });

        // SẮP XẾP KHẢ NĂNG ĐẬU TỪ CAO XUỐNG THẤP dựa trên điểm chênh lệch
        // (Điểm chênh lệch càng cao -> Khả năng đậu càng an toàn)
        filteredSchools.sort((a, b) => b.diff - a.diff);

        // Hiển thị kết quả ra giao diện
        const resultSection = document.getElementById('resultSection');
        const resultBody = document.getElementById('resultBody');
        
        resultSection.style.display = 'block';
        resultBody.innerHTML = '';

        if (filteredSchools.length === 0) {
            resultBody.innerHTML = `<tr><td colspan="6" class="no-result">Rất tiếc, không tìm thấy trường nào phù hợp hoặc điểm của bạn hiện tại thấp hơn điểm chuẩn năm ngoái của các trường thuộc ngành này. Hãy thử hạ mục tiêu hoặc chọn ngành khác xem sao nhé! Chúc bạn may mắn.</td></tr>`;
            return;
        }

        // Render từng hàng vào bảng dữ liệu
        filteredSchools.forEach(school => {
            let statusBadge = '';
            // Gợi ý mức độ an toàn dựa trên điểm chênh lệch
            if (school.diff >= 3) {
                statusBadge = '<span class="badge badge-high">Tỷ lệ đậu cực cao (+3đ)</span>';
            } else {
                statusBadge = '<span class="badge badge-safe">An toàn</span>';
            }

            const row = `
                <tr>
                    <td style="font-weight: 600; color: #2c3e50;">${school.name}</td>
                    <td>${school.province}</td>
                    <td>${school.major}</td>
                    <td><span style="background: #edf2f7; padding: 4px 8px; border-radius:4px;">${school.lastYearScore}</span></td>
                    <td class="score-positive">+${school.diff} điểm</td>
                    <td>${statusBadge}</td>
                </tr>
            `;
            resultBody.innerHTML += row;
        });
    }
</script>

</body>
</html>
